services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-panda_app}
      MYSQL_USER: ${MYSQL_USER:-panda}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_db_password}
      TZ: ${TZ:-Asia/Shanghai}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h 127.0.0.1 -u"$${MYSQL_USER}" -p"$${MYSQL_PASSWORD}" --silent']
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-panda}:${MYSQL_PASSWORD:-change_db_password}@mysql:3306/${MYSQL_DATABASE:-panda_app}?charset=utf8mb4
      MOCK_TOKEN: ${MOCK_TOKEN:-change_mock_token}
      DEMO_USER_NO: ${DEMO_USER_NO:-demo-user}
      DEMO_NICKNAME: ${DEMO_NICKNAME:-今日宜推进}
      DEMO_EMAIL: ${DEMO_EMAIL:-demo@example.com}
      DEMO_PASSWORD: ${DEMO_PASSWORD:-change_demo_password}
      FREE_CHAT_LIMIT: ${FREE_CHAT_LIMIT:-3}
      AI_API_KEY: ${AI_API_KEY:-change_ai_api_key}
      AI_BASE_URL: ${AI_BASE_URL:-https://token-plan-cn.xiaomimimo.com/v1}
      AI_MODEL: ${AI_MODEL:-mimo-v2.5-pro}
      DAILY_FORTUNE_PROMPT_VERSION: ${DAILY_FORTUNE_PROMPT_VERSION:-1.0}
      UPLOAD_DIR: uploads
      AVATAR_DIR: uploads/avatars
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - uploads:/app/uploads
    expose:
      - '8000'

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '${APP_PORT:-8080}:80'

volumes:
  mysql_data:
  uploads:
